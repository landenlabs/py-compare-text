name: Build and Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact: compare-text
            icon: icon.icns
            add_data_sep: ":"
          - os: windows-latest
            artifact: compare-text.exe
            icon: icon.ico
            add_data_sep: ";"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build
        run: >-
          pyinstaller --onefile --windowed --name compare-text
          --icon "${{ matrix.icon }}"
          --add-data "icon.png${{ matrix.add_data_sep }}."
          --add-data "screens${{ matrix.add_data_sep }}screens"
          compare-text6.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: compare-text-${{ matrix.os }}
          path: dist/${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/compare-text-macos-latest/compare-text
            artifacts/compare-text-windows-latest/compare-text.exe
